    // Laika slotu ģenerators
    const generateTimeSlots = (facilityId) => {
      const slots = [];
      if (facilityId === 1) {
        for (let hour = 8; hour <= 20; hour++) {
          for (let minute of [0, 45]) {
            if (hour === 20 && minute === 45) continue;
            const timeLabel = `${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`;
            let status = 'available';
            if (timeLabel === '13:00' || timeLabel === '17:45') status = 'booked';
            slots.push({ id: timeLabel, time: timeLabel, status, duration: 45 });
          }
        }
      } else {
        for (let hour = 9; hour <= 20; hour++) {
          const timeLabel = `${hour.toString().padStart(2,'0')}:00`;
          let status = 'available';
          if (timeLabel === '13:00' || timeLabel === '17:00') status = 'booked';
          slots.push({ id: timeLabel, time: timeLabel, status, duration: 60 });
        }
      }
      return slots;
    };
    
    const getPriceForFacility = (facility, selectedSlot) => {
      if (facility.id === 1) return 10.00;
      if (facility.id === 2) return 42.00;
      if (facility.id === 3 || facility.id === 4 || facility.id === 5) return 20.00;
      if (facility.id === 6) return 32.00;
      if (facility.id === 7) return 12.00;
      if (facility.id === 8) {
        if (selectedSlot) { const hour = parseInt(selectedSlot.time.split(':')[0]); return hour < 17 ? 38.00 : 57.00; }
        return 38.00;
      }
      return facility.basePrice;
    };

        <div className="grid md:grid-cols-2 gap-5">
          <div className="bg-white rounded-2xl p-5 border-l-4 border-emerald-500 shadow"><p className="text-slate-600">Nākamā rezervācija</p><p className="text-2xl font-bold">{upcomingBookings.length > 0 ? upcomingBookings[0].facilityName : "Nav gaidāmo"}</p></div>
          <div className="bg-white rounded-2xl p-5 border-l-4 border-blue-500 shadow"><p className="text-slate-600">Aktīvās rezervācijas</p><p className="text-2xl font-bold">{totalHours}</p></div>
        </div>
        <div className="bg-white rounded-2xl p-5 border shadow">
          <h3 className="text-xl font-semibold mb-4">Manas rezervācijas</h3>
          {upcomingBookings.length === 0 && <p className="text-center py-8 text-slate-500">Nav rezervāciju. Izpēti iespējas!</p>}
          {upcomingBookings.length > 0 && (
            <div className="overflow-x-auto"><table className="min-w-full text-sm"><thead className="border-b"><tr><th className="text-left py-2">Objekts</th><th>Datums</th><th>Laiks</th><th>Cena</th><th></th></tr></thead><tbody>
              {upcomingBookings.map(b => (<tr key={b.id} className="border-b"><td className="py-2 font-medium">{b.facilityName}</td><td>{b.date}</td><td>{b.slot}</td><td>{b.price.toFixed(2)} €</td><td><button onClick={() => onCancelBooking(b.id)} className="bg-red-100 text-red-700 px-2 py-1 rounded text-xs"><i className="fas fa-trash"></i> Atcelt</button></td></tr>))}
            </tbody></table></div>
          )}
        </div>
      </div>
    );
    
    // Rezervācijas lapa
    const BookingPage = ({ facility, onConfirmBooking, onBack }) => {
      const [selectedDate, setSelectedDate] = React.useState(new Date().toISOString().slice(0,10));
      const [timeSlots, setTimeSlots] = React.useState(generateTimeSlots(facility.id));
      const [selectedSlot, setSelectedSlot] = React.useState(null);
      React.useEffect(() => { setTimeSlots(generateTimeSlots(facility.id)); setSelectedSlot(null); }, [selectedDate, facility.id]);
      const handleSlotSelect = (slot) => { if(slot.status !== 'booked') setSelectedSlot(slot.id === selectedSlot?.id ? null : slot); };
      const totalCost = selectedSlot ? getPriceForFacility(facility, selectedSlot) : 0;
      const handleConfirm = () => { if(selectedSlot) { onConfirmBooking({ facilityId: facility.id, facilityName: facility.name, date: selectedDate, slot: selectedSlot.time, price: totalCost }); setSelectedSlot(null); } };
      return (
        <div className="max-w-5xl mx-auto">
          <button onClick={onBack} className="mb-4 text-blue-600 flex items-center gap-1"><i className="fas fa-arrow-left"></i> Atpakaļ uz iespējām</button>
          <div className="bg-white rounded-2xl p-6 border shadow-lg">
            <div className="flex flex-col lg:flex-row gap-8">
              <div className="flex-1">
                <h2 className="text-2xl font-bold">{facility.name} <span className="text-sm bg-gray-100 px-2 py-0.5 rounded-full">{facility.basePrice}€/st (LBTU cena)</span></h2>
                <p className="text-xs text-slate-500 mt-1">{facility.officialNote}</p>
                <div className="mt-4"><label className="block text-slate-700 mb-2"><i className="fas fa-calendar-alt"></i> Izvēlieties datumu</label><input type="date" value={selectedDate} min={new Date().toISOString().slice(0,10)} onChange={(e) => setSelectedDate(e.target.value)} className="border rounded-xl px-4 py-2 w-full sm:w-auto" /></div>
                <div className="mt-6"><p className="font-semibold">Laika sloti</p><div className="grid grid-cols-4 sm:grid-cols-6 gap-3 mt-3">{timeSlots.map(slot => { let bgClass = 'bg-gray-100'; if(slot.status === 'booked') bgClass = 'bg-gray-300 line-through cursor-not-allowed'; if(selectedSlot?.id === slot.id) bgClass = 'bg-blue-600 text-white'; if(slot.status === 'available' && (!selectedSlot || selectedSlot.id !== slot.id)) bgClass = 'bg-emerald-100 hover:bg-emerald-200 cursor-pointer'; return (<button key={slot.id} disabled={slot.status === 'booked'} onClick={() => handleSlotSelect(slot)} className={`py-2 rounded-xl text-sm font-medium ${bgClass}`}>{slot.time}{slot.duration === 45 ? ' (45min)' : ''}</button>); })}</div></div>
              </div>
              <div className="lg:w-80 bg-gray-50 rounded-xl p-5 border"><h3 className="text-xl font-bold border-b pb-2">Rezervācijas kopsavilkums</h3><div className="mt-4 space-y-2 text-sm"><p><span className="text-slate-600">Objekts:</span> {facility.name}</p><p><span className="text-slate-600">Datums:</span> {selectedDate}</p><p><span className="text-slate-600">Laiks:</span> {selectedSlot ? selectedSlot.time : '—'}</p><div className="pt-2 mt-2 border-t flex justify-between font-bold"><span>Kopā (EUR ar PVN):</span><span className="text-emerald-600">{totalCost.toFixed(2)} €</span></div></div><button onClick={handleConfirm} disabled={!selectedSlot} className={`mt-5 w-full py-2.5 rounded-xl font-bold ${selectedSlot ? 'bg-emerald-600 text-white' : 'bg-gray-300 cursor-not-allowed'}`}>Apstiprināt rezervāciju</button></div>
            </div>
          </div>
        </div>
      );
    };
    
    // Hero sadaļa
    const HeroSection = () => (
      <div className="relative rounded-2xl overflow-hidden mb-10 bg-gradient-to-r from-blue-600 to-emerald-500 shadow-xl">
        <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=2070&q=80')] bg-cover bg-center opacity-10"></div>
        <div className="relative p-8 md:p-12 text-center"><h1 className="text-4xl md:text-5xl font-bold mb-4 text-white">LBTU Sporta centrs</h1><p className="text-lg text-white/90 max-w-2xl mx-auto">Oficiālie pakalpojumi, cenas un noteikumi – rezervē baseinu, sporta zāles, kompleksu un stāvvietu.</p></div>
      </div>
    );
    
    // Galvenā aplikācija
    const App = () => {
      const [activeTab, setActiveTab] = React.useState('facilities');
      const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
      const [sportFilter, setSportFilter] = React.useState('all');
      const [priceRange, setPriceRange] = React.useState(100);
      const [userBookings, setUserBookings] = React.useState([]);
      const [bookingFacility, setBookingFacility] = React.useState(null);
      
      const upcomingSorted = [...userBookings].filter(b => b.date >= new Date().toISOString().slice(0,10)).sort((a,b)=>a.date.localeCompare(b.date));
      const totalHours = userBookings.length;
      const handleBookNow = (facility) => { setBookingFacility(facility); setActiveTab('bookingFlow'); };
      const handleConfirmBooking = (newBooking) => { setUserBookings(prev => [...prev, { id: Date.now().toString(), ...newBooking }]); setBookingFacility(null); setActiveTab('dashboard'); alert(`Rezervēts: ${newBooking.facilityName} ${newBooking.date} plkst. ${newBooking.slot} - ${newBooking.price.toFixed(2)} € (LBTU oficiālā cena)`); };
      const handleCancelBooking = (id) => setUserBookings(prev => prev.filter(b => b.id !== id));
      
      const filteredFacilities = facilitiesData.filter(f => (sportFilter === 'all' || f.sportType === sportFilter) && f.basePrice <= priceRange);
      
      let mainContent;
      if (activeTab === 'facilities') mainContent = (<><HeroSection /><Filters sportFilter={sportFilter} setSportFilter={setSportFilter} priceRange={priceRange} setPriceRange={setPriceRange} /><div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">{filteredFacilities.map(fac => <FacilityCard key={fac.id} facility={fac} onBookNow={handleBookNow} />)}</div></>);
      else if (activeTab === 'dashboard') mainContent = <Dashboard upcomingBookings={upcomingSorted} totalHours={totalHours} onCancelBooking={handleCancelBooking} />;
      else if (activeTab === 'pricing') mainContent = <PricingPanel />;
      else if (activeTab === 'info') mainContent = <InfoPanel />;
      else if (activeTab === 'bookingFlow' && bookingFacility) mainContent = <BookingPage facility={bookingFacility} onConfirmBooking={handleConfirmBooking} onBack={() => { setBookingFacility(null); setActiveTab('facilities'); }} />;
      else mainContent = <div className="text-center py-20">Notiek ielāde...</div>;
      
      return (<div><NavBar activeTab={activeTab === 'bookingFlow' ? 'facilities' : activeTab} setActiveTab={(tab) => { if(tab !== 'bookingFlow') { setBookingFacility(null); setActiveTab(tab); } }} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen} /><main className="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">{mainContent}</main><footer className="text-center py-6 text-slate-500 text-sm border-t mt-12">© LBTU Sporta centrs – cenrādis apstiprināts ar rektora rīkojumu Nr. 4.3.-13/76, spēkā no 2022. gada 1. novembra. Publiskās peldēšanas laiki no 2026. gada 1. maija.</footer></div>);
    };
    
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
