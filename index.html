<!DOCTYPE html>

  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1); transition: all 0.2s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
    .calendar-day { transition: all 0.15s ease; }
    .availability-dot { transition: transform 0.1s ease; }
    .rule-list li { margin-bottom: 0.5rem; }
    .qr-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .qr-card {
      max-width: 90vw;
      width: 420px;
      background: white;
      border-radius: 2rem;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-gray-100 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    // ======================== LBTU OFICIĀLIE DATI (PILNĪGI NO VISIEM PIELIKUMIEM) ========================
    const poolPrices = {
      singleAdult: 10.00,

    };
    
    const gymPrices = {

    const complexPrices = {

    };
    
    const parkingPrices = {

    };
    
    const poolSchedule = {
      monday: "8:15 – 15:00 / 19:30 – 21:00",
      tuesday: "8:15 – 15:00 / 19:30 – 21:00",
      wednesday: "9:15 – 15:00 / 19:30 – 21:00",

      saturday: "12:30 – pēc pieraksta (jāpiesaka līdz 12:00)",
      sunday: "SLĒGTS"
    };
    
    const getOpenStatus = () => { const now = new Date(); const day = now.getDay(); const hours = now.getHours(); const minutes = now.getMinutes(); const currentTimeMinutes = hours * 60 + minutes; if (day === 0) return false; if (day === 6) { const satStart = 12 * 60 + 30; const satEnd = 21 * 60; return (currentTimeMinutes >= satStart && currentTimeMinutes <= satEnd); } if (day >= 1 && day <= 5) { const morningStart = 8 * 60 + 15; const middayEnd = 15 * 60; const eveningStart = 19 * 60 + 30; const closeDay = 21 * 60; return (currentTimeMinutes >= morningStart && currentTimeMinutes < middayEnd) || (currentTimeMinutes >= eveningStart && currentTimeMinutes < closeDay); } return false; };
    const getFormattedTime = (date) => date.toLocaleTimeString('lv-LV', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    
    const RealTimeClockWidget = () => {
      const [currentTime, setCurrentTime] = React.useState(new Date());
      const [isOpen, setIsOpen] = React.useState(getOpenStatus());
      const [weather, setWeather] = React.useState(null);
      const [weatherLoading, setWeatherLoading] = React.useState(true);
      React.useEffect(() => { const timer = setInterval(() => { const now = new Date(); setCurrentTime(now); setIsOpen(getOpenStatus()); }, 1000); return () => clearInterval(timer); }, []);
      React.useEffect(() => { const fetchWeather = async () => { try { const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=56.65&longitude=23.71&current_weather=true&units=metric'); const data = await response.json(); if (data.current_weather) { const current = data.current_weather; let condition = 'Skaidrs'; let icon = 'fa-sun'; const code = current.weathercode; if (code === 0 || code === 1) { condition = 'Skaidrs'; icon = 'fa-sun'; } else if (code === 2) { condition = 'Daļēji mākoņains'; icon = 'fa-cloud-sun'; } else if (code === 3) { condition = 'Mākoņains'; icon = 'fa-cloud'; } else if (code >= 45 && code <= 48) { condition = 'Migla'; icon = 'fa-smog'; } else if (code >= 51 && code <= 55) { condition = 'Smidzinošs lietus'; icon = 'fa-cloud-rain'; } else if (code >= 61 && code <= 65) { condition = 'Lietus'; icon = 'fa-cloud-showers-heavy'; } else if (code >= 71 && code <= 75) { condition = 'Sniegs'; icon = 'fa-snowflake'; } else if (code >= 80 && code <= 82) { condition = 'Lietusgāze'; icon = 'fa-cloud-rain'; } else if (code >= 95 && code <= 99) { condition = 'Pērkona negaiss'; icon = 'fa-bolt'; } setWeather({ temp: Math.round(current.temperature), condition, icon, windSpeed: current.windspeed }); } setWeatherLoading(false); } catch (error) { console.error(error); setWeatherLoading(false); } }; fetchWeather(); const weatherInterval = setInterval(fetchWeather, 600000); return () => clearInterval(weatherInterval); }, []);
      const formattedDate = currentTime.toLocaleDateString('lv-LV', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      return (<div className="space-y-3"><div className="bg-white/90 backdrop-blur-sm rounded-2xl shadow-md border border-gray-200 px-5 py-3 flex flex-col md:flex-row md:items-center md:justify-between gap-3"><div className="flex items-center gap-3"><div className="bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl p-2 text-white shadow-md"><i className="fas fa-clock text-xl"></i></div><div><div className="text-xs text-slate-500 uppercase tracking-wide">Pašreizējais laiks</div><div className="text-2xl md:text-3xl font-mono font-bold tracking-tight text-slate-800">{getFormattedTime(currentTime)}</div><div className="text-xs text-slate-500 hidden sm:block">{formattedDate}</div></div></div><div className={`flex items-center gap-2 px-4 py-2 rounded-xl ${isOpen ? 'bg-emerald-50 border border-emerald-200' : 'bg-red-50 border border-red-200'}`}><div className={`w-3 h-3 rounded-full ${isOpen ? 'bg-emerald-500' : 'bg-red-500'}`}></div><div className={`text-base font-bold ${isOpen ? 'text-emerald-700' : 'text-red-700'}`}>{isOpen ? 'Sporta centrs ATVĒRTS' : 'Sporta centrs SLĒGTS'}</div></div></div><div className="bg-white/90 backdrop-blur-sm rounded-2xl shadow-md border border-gray-200 px-5 py-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3"><div className="flex items-center gap-3"><div className="bg-gradient-to-br from-sky-400 to-cyan-500 rounded-xl p-2 text-white shadow-md"><i className="fas fa-cloud-sun text-xl"></i></div><div><div className="text-xs text-slate-500 uppercase tracking-wide">Laiks Jelgavā</div>{weatherLoading ? <div className="text-sm text-slate-400">Ielādē...</div> : weather ? <div className="flex items-center gap-2 flex-wrap"><span className="text-2xl font-bold text-slate-800">{weather.temp}°C</span><span className="text-sm text-slate-600 flex items-center gap-1"><i className={`fas ${weather.icon} text-sky-500`}></i> {weather.condition}</span></div> : <div className="text-sm text-slate-500">Laika dati nav pieejami</div>}</div></div>{weather && !weatherLoading && (<div className="flex items-center gap-3 text-xs text-slate-500"><div className="flex items-center gap-1"><i className="fas fa-wind"></i><span>{weather.windSpeed} km/h</span></div></div>)}</div></div>);
    };
    
    const contactInfo = { address: "Raiņa iela 1, Jelgava, LV-3001", email: "sports@lbtu.lv", actingDirector: { name: "Česlavs Mateikovičs", email: "ceslavs.mateikovics@lbtu.lv" }, manager: { name: "Jānis Slivjuks", phone: "28625432" } };
    
    const facilitiesData = [
      { id: 1, name: "Peldbaseins", type: "Peldēšana", capacity: "25 cilvēki", basePrice: 10.00, icon: "fa-swimmer", imageBg: "linear-gradient(135deg, #0ea5e9, #3b82f6)", sportType: "swimming", officialNote: "45 minūtes ūdenī. Vienreizējs 10€ / 6€ pensionāriem, skolēniem, LBTU studentiem. Abonements 8x 64€. Ģimenes cenām skatīt cenrādi." },
      { id: 2, name: "Lielā sporta zāle", type: "Treniņi / Basketbols", capacity: "40 cilvēki", basePrice: 42.00, icon: "fa-basketball-ball", imageBg: "linear-gradient(135deg, #a855f7, #7c3aed)", sportType: "gym", officialNote: "Lielās zāles īre 42€/h. Mazā zāle 20€/h. Aerobikas un trenažieru zāle 20€/h." },
      { id: 3, name: "Mazā sporta zāle", type: "Badmintons / Galda teniss", capacity: "20 cilvēki", basePrice: 20.00, icon: "fa-table-tennis", imageBg: "linear-gradient(135deg, #f59e0b, #d97706)", sportType: "gym", officialNote: "Mazās zāles īre 20€/h. Individuālās nodarbības badmintonā/galda tenisā 15€/mēnesī." },
      { id: 4, name: "Trenažieru zāle", type: "Spēka treniņi", capacity: "20 cilvēki", basePrice: 20.00, icon: "fa-dumbbell", imageBg: "linear-gradient(135deg, #10b981, #059669)", sportType: "gym", officialNote: "Trenažieru zāles īre 20€/stunda." },
      { id: 5, name: "Aerobikas zāle", type: "Aerobika / Fitness", capacity: "25 cilvēki", basePrice: 20.00, icon: "fa-heartbeat", imageBg: "linear-gradient(135deg, #ec489a, #be185d)", sportType: "gym", officialNote: "Aerobikas zāles īre 20€/stunda." },
      { id: 6, name: "Sporta komplekss (Tērvetes 91D)", type: "Grupu nodarbības", capacity: "30+ cilvēki", basePrice: 32.00, icon: "fa-users", imageBg: "linear-gradient(135deg, #ef4444, #dc2626)", sportType: "football", officialNote: "Nodarbības 4-30 cilvēkiem 32€/h; virs 30 cilv. 39€/h; līdz 4 cilv. 23€/h." },
      { id: 7, name: "Cīņas sporta zāle", type: "Cīņas sports", capacity: "20 cilvēki", basePrice: 12.00, icon: "fa-fist-raised", imageBg: "linear-gradient(135deg, #8b5cf6, #6d28d9)", sportType: "gym", officialNote: "Cīņas sporta zāles īre 12€/stunda." },
      { id: 8, name: "Baseina celiņa īre (uzņēmumiem)", type: "Komerciāla noma", capacity: "6 pieaug. / 8 bērni", basePrice: 38.00, icon: "fa-water", imageBg: "linear-gradient(135deg, #06b6d4, #0891b2)", sportType: "swimming", officialNote: "Darba dienās 8:15-17:15: 38€; vakarā un brīvdienās: 57€. Minimāli uz 1 mēnesi." }
    ];
    
    const getAvailabilityLevel = (dateStr, facilityId) => { let hash = 0; for (let i = 0; i < dateStr.length; i++) hash = ((hash << 5) - hash) + dateStr.charCodeAt(i); hash = (hash * 31 + facilityId) % 100; if (hash < 20) return 0; if (hash < 50) return 1; if (hash < 80) return 2; return 3; };
    
    const MonthlyCalendar = ({ selectedDate, onSelectDate, facilityId }) => {
      const [currentMonth, setCurrentMonth] = React.useState(new Date(selectedDate));
      const changeMonth = (delta) => { const newMonth = new Date(currentMonth); newMonth.setMonth(currentMonth.getMonth() + delta); setCurrentMonth(newMonth); };
      const year = currentMonth.getFullYear(); const month = currentMonth.getMonth();
      const firstDayOfMonth = new Date(year, month, 1); const startDayOfWeek = firstDayOfMonth.getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthDays = new Date(year, month, 0).getDate();
      const daysArray = [];
      for (let i = startDayOfWeek - 1; i >= 0; i--) { const dayNum = prevMonthDays - i; const date = new Date(year, month - 1, dayNum); daysArray.push({ date, dateStr: date.toISOString().slice(0,10), isCurrentMonth: false, dayNum }); }
      for (let d = 1; d <= daysInMonth; d++) { const date = new Date(year, month, d); daysArray.push({ date, dateStr: date.toISOString().slice(0,10), isCurrentMonth: true, dayNum: d }); }
      const remaining = 42 - daysArray.length;
      for (let i = 1; i <= remaining; i++) { const date = new Date(year, month + 1, i); daysArray.push({ date, dateStr: date.toISOString().slice(0,10), isCurrentMonth: false, dayNum: i }); }
      const isSelected = (dateStr) => dateStr === selectedDate;
      const isPast = (date) => { const today = new Date(); today.setHours(0,0,0,0); return date < today; };
      const getDotsCount = (dateStr) => { if (!(new Date(dateStr).getMonth() === month && new Date(dateStr).getFullYear() === year)) return 0; return getAvailabilityLevel(dateStr, facilityId); };
      const weekdays = ['P', 'O', 'T', 'C', 'P', 'S', 'Sv'];
      return (<div className="bg-white rounded-2xl shadow-lg p-5 border border-gray-200"><div className="flex justify-between items-center mb-6"><button onClick={() => changeMonth(-1)} className="p-2 rounded-full hover:bg-gray-100 text-slate-600"><i className="fas fa-chevron-left"></i></button><h3 className="text-xl font-bold text-slate-800">{currentMonth.toLocaleDateString('lv-LV', { month: 'long', year: 'numeric' })}</h3><button onClick={() => changeMonth(1)} className="p-2 rounded-full hover:bg-gray-100 text-slate-600"><i className="fas fa-chevron-right"></i></button></div><div className="grid grid-cols-7 gap-1 text-center mb-2">{weekdays.map(day => (<div key={day} className="text-xs font-semibold text-slate-400 uppercase py-2">{day}</div>))}</div><div className="grid grid-cols-7 gap-1">{daysArray.map((day, idx) => { const dateStr = day.dateStr; const dotsCount = getDotsCount(dateStr); const disabled = isPast(day.date) || !day.isCurrentMonth; const isSelectedDay = isSelected(dateStr); return (<button key={idx} onClick={() => { if (!disabled && day.isCurrentMonth) onSelectDate(dateStr); }} disabled={disabled} className={`calendar-day relative p-2 rounded-xl text-center transition-all min-h-[70px] flex flex-col items-center justify-start gap-1 ${disabled ? 'bg-gray-50 text-gray-300 cursor-not-allowed opacity-60' : 'hover:bg-blue-50 cursor-pointer'} ${isSelectedDay && !disabled ? 'bg-blue-100 ring-2 ring-blue-400 shadow-sm' : ''} ${day.isCurrentMonth && !disabled ? 'text-slate-700' : 'text-gray-400'}`}><span className={`text-sm font-medium ${isSelectedDay ? 'text-blue-700 font-bold' : ''}`}>{day.dayNum}</span>{!disabled && day.isCurrentMonth && dotsCount > 0 && (<div className="flex justify-center gap-[3px] mt-1 flex-wrap">{[...Array(dotsCount)].map((_, i) => (<div key={i} className={`availability-dot w-1.5 h-1.5 rounded-full ${dotsCount === 1 ? 'bg-emerald-400' : dotsCount === 2 ? 'bg-emerald-500' : 'bg-emerald-600'} shadow-sm`}></div>))}</div>)}{!disabled && day.isCurrentMonth && dotsCount === 0 && (<div className="text-[10px] text-gray-400 mt-1">-</div>)}</button>); })}</div><div className="flex justify-center gap-6 mt-5 pt-3 border-t text-xs text-slate-500"><div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-emerald-400"></div><span>Zema pieej.</span></div><div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-emerald-500"></div><span>Vidēja</span></div><div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-emerald-600"></div><span>Augsta</span></div><div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-gray-300"></div><span>Nav brīvu</span></div></div></div>);
    };
    
    const generateTimeSlots = (facilityId, selectedDate, existingBookedSlots = new Set()) => {
      const slots = [];
      if (facilityId === 1) { for (let hour = 8; hour <= 20; hour++) { for (let minute of [0, 45]) { if (hour === 20 && minute === 45) continue; const timeLabel = `${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`; const slotKey = `${selectedDate}|${timeLabel}`; let status = existingBookedSlots.has(slotKey) ? 'booked' : 'available'; slots.push({ id: timeLabel, time: timeLabel, status, duration: 45 }); } } } 
      else { for (let hour = 9; hour <= 20; hour++) { const timeLabel = `${hour.toString().padStart(2,'0')}:00`; slots.push({ id: timeLabel, time: timeLabel, status: 'available', duration: 60 }); } }
      return slots;
    };
    
    const getPriceForFacility = (facility, selectedSlot) => { if (facility.id === 1) return 10.00; if (facility.id === 2) return 42.00; if (facility.id === 3 || facility.id === 4 || facility.id === 5) return 20.00; if (facility.id === 6) return 32.00; if (facility.id === 7) return 12.00; if (facility.id === 8) { const hour = selectedSlot ? parseInt(selectedSlot.time.split(':')[0]) : 10; return hour < 17 ? 38.00 : 57.00; } return facility.basePrice; };
    
    const QRModal = ({ booking, onClose }) => {
      const qrContainerRef = React.useRef(null);
      React.useEffect(() => {
        if (qrContainerRef.current && booking) {
          qrContainerRef.current.innerHTML = "";
          const payload = JSON.stringify({
            id: booking.id,
            facility: booking.facilityName,
            date: booking.date,
            time: booking.slot,
            price: booking.price,
            timestamp: booking.timestamp,
            hash: btoa(`${booking.id}-${booking.date}-${booking.slot}-LBTU`)
          });
          new QRCode(qrContainerRef.current, { text: payload, width: 200, height: 200, colorDark: "#1e293b", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M });
        }
      }, [booking]);
      return (<div className="qr-modal-overlay" onClick={onClose}><div className="qr-card p-6" onClick={(e) => e.stopPropagation()}><div className="flex justify-between items-center mb-4"><h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><i className="fas fa-qrcode text-emerald-600"></i> Rezervācijas QR kods</h3><button onClick={onClose} className="text-gray-400 hover:text-gray-600"><i className="fas fa-times text-2xl"></i></button></div><div className="bg-gray-50 rounded-xl p-4 mb-4"><div className="grid grid-cols-2 gap-2 text-sm"><div className="text-slate-500">Objekts:</div><div className="font-medium">{booking.facilityName}</div><div className="text-slate-500">Datums:</div><div className="font-medium">{booking.date}</div><div className="text-slate-500">Laiks:</div><div className="font-medium">{booking.slot}</div><div className="text-slate-500">Cena:</div><div className="font-medium text-emerald-600">{booking.price.toFixed(2)} €</div></div></div><div className="flex justify-center mb-4"><div ref={qrContainerRef} className="bg-white p-3 rounded-xl shadow-inner border"></div></div><p className="text-xs text-center text-slate-500 mt-2"><i className="fas fa-shield-alt text-emerald-500 mr-1"></i> Uzrādiet šo QR kodu pie ieejas sporta centrā.</p><button onClick={onClose} className="mt-5 w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-xl font-semibold">Aizvērt</button></div></div>);
    };
    
    const NavBar = ({ activeTab, setActiveTab, mobileMenuOpen, setMobileMenuOpen }) => {
      const navItems = [{ id: 'facilities', label: 'Iespējas' }, { id: 'dashboard', label: 'Panelis' }, { id: 'pricing', label: 'Cenrādis' }, { id: 'info', label: 'Noteikumi' }, { id: 'contacts', label: 'Kontakti' }];
      return (<nav className="bg-white/90 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50 shadow-sm"><div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div className="flex justify-between items-center h-16"><div className="flex items-center space-x-2 cursor-pointer" onClick={() => setActiveTab('facilities')}><img src="https://cloud-1de12d.becdn.net/media/original/877667af231d144047db347d9ade334d/2565306-1-02.png" alt="LBTU Sporta centrs logo" className="h-12 w-auto object-contain" /><span className="font-bold text-xl tracking-tight bg-gradient-to-r from-emerald-600 to-blue-600 bg-clip-text text-transparent">Sporta Centrs</span></div><div className="hidden md:flex space-x-1">{navItems.map(item => (<button key={item.id} onClick={() => setActiveTab(item.id)} className={`px-4 py-2 rounded-lg font-medium transition-all ${activeTab === item.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-700 hover:bg-gray-100'}`}>{item.label}</button>))}</div><div className="md:hidden"><button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2 rounded-lg text-slate-700"><i className={`fas ${mobileMenuOpen ? 'fa-times' : 'fa-bars'} text-xl`}></i></button></div></div>{mobileMenuOpen && (<div className="md:hidden pb-3 space-y-1">{navItems.map(item => (<button key={item.id} onClick={() => { setActiveTab(item.id); setMobileMenuOpen(false); }} className="w-full text-left px-3 py-2 rounded-lg text-slate-700 hover:bg-gray-100">{item.label}</button>))}</div>)}</div></nav>);
    };
    
    // FULL PRICING PANEL with all original tables
    const PricingPanel = () => (<div className="space-y-6"><div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-swimmer text-blue-500"></i> Peldbaseins (45 minūtes ūdenī) – cenas ar PVN</h2><div className="grid md:grid-cols-2 gap-3 text-sm"><div className="flex justify-between border-b py-2"><span>Vienreizējs apmeklējums (pieaugušais)</span><span className="font-bold">10.00 €</span></div><div className="flex justify-between border-b py-2"><span>Pensionāriem, skolēniem (no 16 g.), LBTU studentiem/darbiniekiem</span><span className="font-bold">6.00 €</span></div><div className="flex justify-between border-b py-2"><span>Bērni invalīdi līdz 18 g. ar pavadoni</span><span className="font-bold">Bezmaksas</span></div><div className="flex justify-between border-b py-2"><span>Daudzbērnu ģimene (2 pieaug. + 3+ bērni)</span><span className="font-bold">19.00 €</span></div><div className="flex justify-between border-b py-2"><span>1 pieaugušais + 1 bērns (līdz 16 g.)</span><span className="font-bold">16.00 €</span></div><div className="flex justify-between border-b py-2"><span>1 pieaugušais + 2 bērni</span><span className="font-bold">16.00 €</span></div><div className="flex justify-between border-b py-2"><span>2 pieaugušie + 1 bērns</span><span className="font-bold">19.00 €</span></div><div className="flex justify-between border-b py-2"><span>2 pieaugušie + 2 bērni</span><span className="font-bold">25.00 €</span></div><div className="flex justify-between border-b py-2"><span>Abonements 8 apmeklējumiem (8 nedēļu laikā)</span><span className="font-bold">64.00 €</span></div><div className="flex justify-between border-b py-2"><span>Viena celiņa īre (darba dienās 8:15-17:15, uzņēmumiem)</span><span className="font-bold">38.00 €</span></div><div className="flex justify-between border-b py-2"><span>Viena celiņa īre (vakars/brīvdienas 17:15-21:00)</span><span className="font-bold">57.00 €</span></div></div></div><div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-dumbbell text-purple-500"></i> Sporta zāles (Raiņa ielā-1) – cenas ar PVN</h2><div className="grid md:grid-cols-2 gap-3 text-sm"><div className="flex justify-between border-b py-2"><span>Lielās sporta zāles īre (1 stunda)</span><span className="font-bold">42.00 €</span></div><div className="flex justify-between border-b py-2"><span>Mazās zāles īre (1 stunda)</span><span className="font-bold">20.00 €</span></div><div className="flex justify-between border-b py-2"><span>Individuālās nodarbības badmintonā, galda tenisā (mēnesī)</span><span className="font-bold">15.00 €</span></div><div className="flex justify-between border-b py-2"><span>Aerobikas zāles īre (1 stunda)</span><span className="font-bold">20.00 €</span></div><div className="flex justify-between border-b py-2"><span>Trenažieru zāles īre (1 stunda)</span><span className="font-bold">20.00 €</span></div></div></div><div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-building text-red-500"></i> Sporta komplekss (Tērvetes 91D)</h2><div className="grid md:grid-cols-2 gap-3 text-sm"><div className="flex justify-between border-b py-2"><span>Nodarbības līdz 4 cilvēkiem (1 stunda)</span><span className="font-bold">23.00 €</span></div><div className="flex justify-between border-b py-2"><span>Nodarbības 4-30 cilvēkiem (1 stunda)</span><span className="font-bold">32.00 €</span></div><div className="flex justify-between border-b py-2"><span>Nodarbības vairāk par 30 cilvēkiem (1 stunda)</span><span className="font-bold">39.00 €</span></div><div className="flex justify-between border-b py-2"><span>Cīņas sporta zāle (1 stunda)</span><span className="font-bold">12.00 €</span></div></div></div><div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-parking text-amber-500"></i> Auto stāvlaukums (Raiņa ielā 1, Jelgavā)</h2><div className="bg-amber-50 p-3 rounded-lg mb-4 text-sm">Apmeklētājiem līdz 3 stundām bez maksas, jānovieto stāvēšanas pulkstenis redzamā vietā.</div><div className="grid md:grid-cols-3 gap-4 text-sm"><div className="flex justify-between border-b py-2"><span>Līdz 3 stundām</span><span className="font-bold">Bezmaksas</span></div><div className="flex justify-between border-b py-2"><span>Līdz 24 stundām</span><span className="font-bold">3.00 €</span></div><div className="flex justify-between border-b py-2"><span>Mēneša atļauja (30 dienas)</span><span className="font-bold">25.00 €</span></div></div><p className="text-xs text-slate-500 mt-3">Atļauju var iegādāties Sporta centra 2.stāvā pie administratora (darba dienās 9:00–20:00).</p></div><div className="bg-blue-50 rounded-xl p-4 text-sm border border-blue-200"><i className="fas fa-gavel text-blue-600 mr-2"></i> Cenrādis apstiprināts ar Latvijas Biozinātņu un tehnoloģiju universitātes 15.09.2022. rektora rīkojumu Nr. 4.3.-13/76. Spēkā no 2022. gada 1. novembra.</div></div>);
    
    // FULL INFO PANEL with pool schedule + detailed rules
    const InfoPanel = () => (<div className="space-y-6"><div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-clock text-blue-500"></i> Peldbaseina publiskā apmeklējuma laiks (no 2026. gada 1. maija)</h2><div className="grid md:grid-cols-2 gap-3 text-sm bg-gray-50 p-4 rounded-xl"><div><span className="font-bold">Pirmdiena:</span> {poolSchedule.monday}</div><div><span className="font-bold">Otrdiena:</span> {poolSchedule.tuesday}</div><div><span className="font-bold">Trešdiena:</span> {poolSchedule.wednesday}</div><div><span className="font-bold">Ceturtdiena:</span> {poolSchedule.thursday}</div><div><span className="font-bold">Piektdiena:</span> {poolSchedule.friday}</div><div><span className="font-bold">Sestdiena:</span> {poolSchedule.saturday}</div><div><span className="font-bold">Svētdiena:</span> {poolSchedule.sunday}</div></div><p className="text-sm text-amber-700 mt-3 bg-amber-50 p-2 rounded-lg">Publiskās peldēšanas laiks jāpiesaka iepriekš zvanot pa tālruni 25427282</p></div><div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-file-alt text-emerald-600"></i> Sporta centra iekšējās kārtības noteikumi</h2><ul className="list-disc pl-5 space-y-2 text-sm rule-list"><li>Sporta centra apmeklētāji personīgi atbild par savu veselības stāvokli un drošības noteikumu ievērošanu.</li><li>Bērni līdz 14 gadu vecumam drīkst atrasties tikai vecāku vai pilngadīga pavadoņa uzraudzībā.</li><li>Peldbaseina un sporta zāļu telpās atļauts ieiet tikai tīros maiņas apavos; virsdrēbes atstāt garderobē.</li><li><span className="font-bold">Stingri aizliegts:</span> ienest stikla traukus, atrasties alkohola/narkotiku reibumā, smēķēt, bojāt inventāru, lēkt ūdenī no baseina malām, spļaut ūdenī vai uz grīdas (sods līdz 30 €).</li><li>Personām ar ādas slimībām, atklātām brūcēm, konjuktivītu vai citām lipīgām saslimšanām peldbaseinu apmeklēt aizliegts.</li><li>Par atstātajām vērtslietām ģērbtuvēs administrācija atbildību nenes.</li><li>Nodarbību laikā ar cieņu jāizturas vienam pret otru un jāievēro instruktoru norādījumi.</li></ul></div></div>);
    
    const ContactsPanel = () => (<div className="space-y-6"><div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-6"><i className="fas fa-address-card text-blue-500"></i> Kontaktinformācija</h2><div className="grid md:grid-cols-2 gap-6"><div className="space-y-4"><div className="flex items-start gap-3"><i className="fas fa-map-marker-alt text-emerald-500 mt-1 w-5"></i><div><p className="font-semibold text-slate-800">Adrese</p><p className="text-slate-600">{contactInfo.address}</p></div></div><div className="flex items-start gap-3"><i className="fas fa-envelope text-emerald-500 mt-1 w-5"></i><div><p className="font-semibold text-slate-800">E-pasts</p><a href="mailto:sports@lbtu.lv" className="text-blue-600 hover:underline">{contactInfo.email}</a></div></div></div><div className="bg-gray-50 rounded-xl p-4 border"><div className="flex items-center gap-2 mb-3"><i className="fas fa-user-tie text-amber-600"></i><p className="font-semibold">Direktora p.i.</p></div><p className="font-medium">{contactInfo.actingDirector.name}</p><a href="mailto:ceslavs.mateikovics@lbtu.lv" className="text-blue-600 text-sm">{contactInfo.actingDirector.email}</a></div><div className="bg-gray-50 rounded-xl p-4 border"><div className="flex items-center gap-2 mb-3"><i className="fas fa-user-cog text-blue-500"></i><p className="font-semibold">Pārvaldnieks</p></div><p className="font-medium">{contactInfo.manager.name}</p><a href="tel:+37128625432" className="text-blue-600 text-sm">{contactInfo.manager.phone}</a></div></div></div><div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-xl font-bold mb-4">Kartes atrašanās vieta</h2><div className="aspect-video bg-gray-100 rounded-xl overflow-hidden"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2181.789514879616!2d23.72144567699205!3d56.65232713695286!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x46eec11bcfd1f5f5%3A0x4b8e9f5a3c5a5a5a!2sRai%C5%86a%20iela%201%2C%20Jelgava%2C%20LV-3001!5e0!3m2!1sen!2slv!4v1710000000000!5m2!1sen!2slv" width="100%" height="100%" style={{ border: 0 }} allowFullScreen="" loading="lazy" title="Karte" className="w-full h-full"></iframe></div></div></div>);
    
    const Dashboard = ({ upcomingBookings, totalHours, onCancelBooking, onViewQR }) => (<div className="space-y-6"><div className="grid md:grid-cols-2 gap-5"><div className="bg-white rounded-2xl p-5 border-l-4 border-emerald-500 shadow"><p className="text-slate-600">Nākamā rezervācija</p><p className="text-2xl font-bold">{upcomingBookings.length > 0 ? upcomingBookings[0].facilityName : "Nav gaidāmo"}</p></div><div className="bg-white rounded-2xl p-5 border-l-4 border-blue-500 shadow"><p className="text-slate-600">Aktīvās rezervācijas</p><p className="text-2xl font-bold">{totalHours}</p></div></div><div className="bg-white rounded-2xl p-5 border shadow"><h3 className="text-xl font-semibold mb-4">Manas rezervācijas</h3>{upcomingBookings.length === 0 && <p className="text-center py-8 text-slate-500">Nav rezervāciju.</p>}{upcomingBookings.length > 0 && (<div className="overflow-x-auto"><table className="min-w-full text-sm"><thead className="border-b"><tr><th className="text-left py-2">Objekts</th><th>Datums</th><th>Laiks</th><th>Cena</th><th></th><th></th></tr></thead><tbody>{upcomingBookings.map(b => (<tr key={b.id} className="border-b"><td className="py-2 font-medium">{b.facilityName}</td><td>{b.date}</td><td>{b.slot}</td><td>{b.price.toFixed(2)} €</td><td><button onClick={() => onViewQR(b)} className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded text-xs flex items-center gap-1"><i className="fas fa-qrcode"></i> QR</button></td><td><button onClick={() => onCancelBooking(b.id)} className="bg-red-100 text-red-700 px-2 py-1 rounded text-xs"><i className="fas fa-trash"></i> Atcelt</button></td></tr>))}</tbody></table></div>)}</div></div>);
    
    const Filters = ({ sportFilter, setSportFilter, priceRange, setPriceRange }) => {
      const sportTypes = ["all", "swimming", "gym", "football"]; const displayNames = { all:"Visi", swimming:"Peldēšana", gym:"Treniņu zāles", football:"Komplekss" };
      return (<div className="bg-white rounded-xl p-4 border border-gray-200 shadow-sm"><div className="flex flex-wrap gap-3 items-center justify-between"><div className="flex flex-wrap gap-2">{sportTypes.map(sport => (<button key={sport} onClick={() => setSportFilter(sport)} className={`px-3 py-1.5 rounded-full text-sm font-medium transition ${sportFilter === sport ? 'bg-blue-600 text-white' : 'bg-gray-100 text-slate-700'}`}>{displayNames[sport]}</button>))}</div><div className="flex items-center gap-2 bg-gray-100 px-3 py-1 rounded-full"><i className="fas fa-euro-sign text-emerald-500"></i><input type="range" min="0" max="100" step="5" value={priceRange} onChange={(e) => setPriceRange(parseInt(e.target.value))} className="w-28 accent-emerald-500" /><span className="text-sm font-mono">≤ {priceRange}€</span></div></div></div>);
    };
    
    const HeroSection = () => (<div className="relative rounded-2xl overflow-hidden mb-6 bg-gradient-to-r from-blue-600 to-emerald-500 shadow-xl"><div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=2070&q=80')] bg-cover bg-center opacity-10"></div><div className="relative p-8 md:p-12 text-center"><h1 className="text-4xl md:text-5xl font-bold mb-4 text-white">LBTU Sporta centrs</h1><p className="text-lg text-white/90 max-w-2xl mx-auto">Oficiālie pakalpojumi, cenas un noteikumi – rezervē baseinu, sporta zāles, kompleksu un stāvvietu.</p></div></div>);
    
    const FacilityCard = ({ facility, onBookNow }) => (<div className="bg-white rounded-2xl overflow-hidden shadow-md border border-gray-200 card-hover"><div className="h-32 w-full flex items-center justify-center" style={{ background: facility.imageBg }}><i className={`fas ${facility.icon} text-5xl text-white drop-shadow-lg`}></i></div><div className="p-5"><h3 className="text-xl font-bold text-slate-800">{facility.name}</h3><div className="flex items-center gap-3 text-sm text-slate-600 mt-2"><span><i className="fas fa-users mr-1"></i>{facility.capacity}</span><span><i className="fas fa-clock mr-1"></i>{facility.basePrice}€/st</span></div><p className="text-xs text-slate-500 mt-2 line-clamp-3">{facility.officialNote}</p><button onClick={() => onBookNow(facility)} className="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-xl text-sm font-semibold transition flex items-center justify-center gap-2 shadow"><i className="fas fa-calendar-plus"></i>Rezervēt</button></div></div>);
    
    const BookingPage = ({ facility, onConfirmBooking, onBack }) => {
      const [selectedDate, setSelectedDate] = React.useState(new Date().toISOString().slice(0,10));
      const [timeSlots, setTimeSlots] = React.useState([]);
      const [selectedSlot, setSelectedSlot] = React.useState(null);
      const [globalBookedSlots] = React.useState(() => new Set());
      React.useEffect(() => { const slots = generateTimeSlots(facility.id, selectedDate, globalBookedSlots); setTimeSlots(slots); setSelectedSlot(null); }, [selectedDate, facility.id]);
      const totalCost = selectedSlot ? getPriceForFacility(facility, selectedSlot) : 0;
      const handleConfirm = () => { if(selectedSlot) { onConfirmBooking({ facilityId: facility.id, facilityName: facility.name, date: selectedDate, slot: selectedSlot.time, price: totalCost }); setSelectedSlot(null); } };
      return (<div className="max-w-6xl mx-auto"><button onClick={onBack} className="mb-4 text-blue-600 flex items-center gap-1"><i className="fas fa-arrow-left"></i> Atpakaļ</button><div className="bg-white rounded-2xl p-6 border shadow-lg"><div className="flex flex-col lg:flex-row gap-8"><div className="flex-1"><h2 className="text-2xl font-bold">{facility.name}</h2><p className="text-sm text-slate-500 mt-1 mb-4">{facility.officialNote}</p><MonthlyCalendar selectedDate={selectedDate} onSelectDate={setSelectedDate} facilityId={facility.id} /></div><div className="lg:w-96"><div className="bg-gray-50 rounded-xl p-5 border"><div className="mb-3"><span className="font-bold">Datums:</span><span className="ml-2 bg-blue-100 px-2 py-0.5 rounded-full text-sm">{selectedDate}</span></div><p className="font-semibold mb-2">Pieejamie laiki:</p><div className="grid grid-cols-3 gap-2 max-h-64 overflow-y-auto p-1">{timeSlots.map(slot => { let bgClass = 'bg-gray-100 text-slate-500'; if(slot.status === 'booked') bgClass = 'bg-gray-300 line-through cursor-not-allowed'; if(selectedSlot?.id === slot.id) bgClass = 'bg-blue-600 text-white'; if(slot.status === 'available' && (!selectedSlot || selectedSlot.id !== slot.id)) bgClass = 'bg-emerald-100 hover:bg-emerald-200 cursor-pointer text-slate-700'; return (<button key={slot.id} disabled={slot.status === 'booked'} onClick={() => { if(slot.status !== 'booked') setSelectedSlot(slot); }} className={`py-2 rounded-xl text-sm font-medium ${bgClass}`}>{slot.time}{slot.duration === 45 ? ' (45\')' : ''}</button>); })}</div><div className="mt-5 pt-3 border-t"><div className="flex justify-between font-bold"><span>Kopā (EUR ar PVN):</span><span className="text-emerald-600">{totalCost.toFixed(2)} €</span></div><button onClick={handleConfirm} disabled={!selectedSlot} className={`mt-4 w-full py-2.5 rounded-xl font-bold ${selectedSlot ? 'bg-emerald-600 text-white hover:bg-emerald-700' : 'bg-gray-300 cursor-not-allowed'}`}>Apstiprināt rezervāciju</button></div></div></div></div></div></div>);
    };
    
    const App = () => {
      const [activeTab, setActiveTab] = React.useState('facilities');
      const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
      const [sportFilter, setSportFilter] = React.useState('all');
      const [priceRange, setPriceRange] = React.useState(100);
      const [userBookings, setUserBookings] = React.useState([]);
      const [bookingFacility, setBookingFacility] = React.useState(null);
      const [qrBooking, setQrBooking] = React.useState(null);
      
      const upcomingSorted = [...userBookings].filter(b => b.date >= new Date().toISOString().slice(0,10)).sort((a,b)=>a.date.localeCompare(b.date));
      const totalHours = userBookings.length;
      const handleBookNow = (facility) => { setBookingFacility(facility); setActiveTab('bookingFlow'); };
      const handleConfirmBooking = (newBooking) => { const bookingWithTimestamp = { id: Date.now().toString(), timestamp: new Date().toISOString(), ...newBooking }; setUserBookings(prev => [...prev, bookingWithTimestamp]); setBookingFacility(null); setActiveTab('dashboard'); alert(`Rezervēts: ${newBooking.facilityName} (${newBooking.date} ${newBooking.slot}) - ${newBooking.price.toFixed(2)} €. QR kods pieejams panelī.`); };
      const handleCancelBooking = (id) => setUserBookings(prev => prev.filter(b => b.id !== id));
      const handleViewQR = (booking) => setQrBooking(booking);
      const filteredFacilities = facilitiesData.filter(f => (sportFilter === 'all' || f.sportType === sportFilter) && f.basePrice <= priceRange);
      
      let mainContent;
      if (activeTab === 'facilities') mainContent = (<><HeroSection /><RealTimeClockWidget /><Filters sportFilter={sportFilter} setSportFilter={setSportFilter} priceRange={priceRange} setPriceRange={setPriceRange} /><div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-6">{filteredFacilities.map(fac => <FacilityCard key={fac.id} facility={fac} onBookNow={handleBookNow} />)}</div></>);
      else if (activeTab === 'dashboard') mainContent = <Dashboard upcomingBookings={upcomingSorted} totalHours={totalHours} onCancelBooking={handleCancelBooking} onViewQR={handleViewQR} />;
      else if (activeTab === 'pricing') mainContent = <PricingPanel />;
      else if (activeTab === 'info') mainContent = <InfoPanel />;
      else if (activeTab === 'contacts') mainContent = <ContactsPanel />;
      else if (activeTab === 'bookingFlow' && bookingFacility) mainContent = <BookingPage facility={bookingFacility} onConfirmBooking={handleConfirmBooking} onBack={() => { setBookingFacility(null); setActiveTab('facilities'); }} />;
      else mainContent = <div className="text-center py-20">Notiek ielāde...</div>;
      
      return (<div><NavBar activeTab={activeTab === 'bookingFlow' ? 'facilities' : activeTab} setActiveTab={(tab) => { if(tab !== 'bookingFlow') { setBookingFacility(null); setActiveTab(tab); } }} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen} /><main className="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">{mainContent}</main><footer className="text-center py-6 text-slate-500 text-sm border-t mt-12"><span>© 2x200 Developer - Depositary (as of 8 June 2026) 👉</span><br className="block sm:hidden" /><a href="https://github.com/2x200/LBTU-Sporta-Centrs" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:text-blue-700 underline inline-flex items-center gap-1 mt-2 sm:mt-0 sm:ml-2"><i className="fas fa-external-link-alt text-xs"></i>GitHub.com</a></footer>{qrBooking && <QRModal booking={qrBooking} onClose={() => setQrBooking(null)} />}</div>);
    };
    
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
