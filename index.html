    // ----- SIMPLIFIED OPEN STATUS (only open/closed, no session text, no icons/pulses) -----
    const getOpenStatus = () => {
      const now = new Date();
      const day = now.getDay(); // 0 = Sunday, 1 = Monday ... 6 = Saturday
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const currentTimeMinutes = hours * 60 + minutes;
      
      // Sunday closed
      if (day === 0) return false;
      
      // Saturday: 12:30 – 21:00
      if (day === 6) {
        const satStart = 12 * 60 + 30;
        const satEnd = 21 * 60;
        return (currentTimeMinutes >= satStart && currentTimeMinutes <= satEnd);
      }
      
      // Weekday (Monday - Friday): 8:15–15:00 OR 19:30–21:00
      if (day >= 1 && day <= 5) {
        const morningStart = 8 * 60 + 15;   // 8:15
        const middayEnd = 15 * 60;          // 15:00
        const eveningStart = 19 * 60 + 30;  // 19:30
        const closeDay = 21 * 60;           // 21:00
        const isMorningOpen = (currentTimeMinutes >= morningStart && currentTimeMinutes < middayEnd);
        const isEveningOpen = (currentTimeMinutes >= eveningStart && currentTimeMinutes < closeDay);
        return (isMorningOpen || isEveningOpen);
      }
      
      return false;
    };

      try {
        // Using free Open-Meteo API (no API key required)
        const response = await fetch(

        if (data.current_weather) {
          const current = data.current_weather;
          // Map weather codes to icons and descriptions
          const code = current.weathercode;
          let condition = 'Skaidrs';
          let icon = 'fa-sun';
          if (code === 0 || code === 1) { condition = 'Skaidrs'; icon = 'fa-sun'; }
          else if (code === 2) { condition = 'Daļēji mākoņains'; icon = 'fa-cloud-sun'; }
          else if (code === 3) { condition = 'Mākoņains'; icon = 'fa-cloud'; }
          else if (code >= 45 && code <= 48) { condition = 'Migla'; icon = 'fa-smog'; }
          else if (code >= 51 && code <= 55) { condition = 'Smidzinošs lietus'; icon = 'fa-cloud-rain'; }
          else if (code >= 56 && code <= 57) { condition = 'Ledus lietus'; icon = 'fa-icicles'; }
          else if (code >= 61 && code <= 65) { condition = 'Lietus'; icon = 'fa-cloud-showers-heavy'; }
          else if (code >= 66 && code <= 67) { condition = 'Ledus lietus'; icon = 'fa-icicles'; }
          else if (code >= 71 && code <= 75) { condition = 'Sniegs'; icon = 'fa-snowflake'; }
          else if (code === 77) { condition = 'Sniega graudi'; icon = 'fa-snowflake'; }
          else if (code >= 80 && code <= 82) { condition = 'Lietusgāze'; icon = 'fa-cloud-rain'; }
          else if (code >= 85 && code <= 86) { condition = 'Sniega vētra'; icon = 'fa-snowflake'; }
          else if (code >= 95 && code <= 99) { condition = 'Pērkona negaiss'; icon = 'fa-bolt'; }
          
          setWeather({
            temp: Math.round(current.temperature),
            condition: condition,
            icon: icon,
            windSpeed: current.windspeed
          });
        }
        setWeatherLoading(false);
      } catch (error) {
        console.error('Weather fetch error:', error);
        setWeatherLoading(false);
      }
    };

    const generateTimeSlots = (facilityId) => {
      const slots = [];
      if (facilityId === 1) {
        for (let hour = 8; hour <= 20; hour++) {
          for (let minute of [0, 45]) {
            if (hour === 20 && minute === 45) continue;
            const timeLabel = `${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`;
            let status = 'available';
            if (timeLabel === '13:00' || timeLabel === '17:45') status = 'booked';
            slots.push({ id: timeLabel, time: timeLabel, status, duration: 45 });
          }
        }
      } else {
        for (let hour = 9; hour <= 20; hour++) {
          const timeLabel = `${hour.toString().padStart(2,'0')}:00`;
          let status = 'available';
          if (timeLabel === '13:00' || timeLabel === '17:00') status = 'booked';

            <span><i className="fas fa-users mr-1"></i>{facility.capacity}</span>
            <span><i className="fas fa-clock mr-1"></i>{facility.basePrice}€/st</span>
          </div>
          <p className="text-xs text-slate-500 mt-2 line-clamp-3">{facility.officialNote}</p>
          <button onClick={() => onBookNow(facility)} className="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-xl text-sm font-semibold transition flex items-center justify-center gap-2 shadow"><i className="fas fa-calendar-plus"></i>Rezervēt</button>
        </div>
      </div>
    );
    
    // Pilns cenrādis (oriģināls)
    const PricingPanel = () => (
      <div className="space-y-6">
        <div className="bg-white rounded-2xl p-6 border shadow-md">
          <h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-swimmer text-blue-500"></i> Peldbaseins (45 minūtes ūdenī) – cenas ar PVN</h2>
          <div className="grid md:grid-cols-2 gap-3 text-sm">
            <div className="flex justify-between border-b py-2"><span>Vienreizējs apmeklējums (pieaugušais)</span><span className="font-bold">10.00 €</span></div>
            <div className="flex justify-between border-b py-2"><span>Pensionāriem, skolēniem (no 16 g.), LBTU studentiem/darbiniekiem</span><span className="font-bold">6.00 €</span></div>
            <div className="flex justify-between border-b py-2"><span>Bērni invalīdi līdz 18 g. ar pavadoni</span><span className="font-bold">Bezmaksas</span></div>
            <div className="flex justify-between border-b py-2"><span>Daudzbērnu ģimene (2 pieaug. + 3+ bērni)</span><span className="font-bold">19.00 €</span></div>
            <div className="flex justify-between border-b py-2"><span>1 pieaugušais + 1 bērns (līdz 16 g.)</span><span className="font-bold">16.00 €</span></div>
            <div className="flex justify-between border-b py-2"><span>1 pieaugušais + 2 bērni</span><span className="font-bold">16.00 €</span></div>
            <div className="flex justify-between border-b py-2"><span>2 pieaugušie + 1 bērns</span><span className="font-bold">19.00 €</span></div>
            <div className="flex justify-between border-b py-2"><span>2 pieaugušie + 2 bērni</span><span className="font-bold">25.00 €</span></div>
            <div className="flex justify-between border-b py-2"><span>Abonements 8 apmeklējumiem (8 nedēļu laikā)</span><span className="font-bold">64.00 €</span></div>
            <div className="flex justify-between border-b py-2"><span>Viena celiņa īre (darba dienās 8:15-17:15, uzņēmumiem)</span><span className="font-bold">38.00 €</span></div>
            <div className="flex justify-between border-b py-2"><span>Viena celiņa īre (vakars/brīvdienas 17:15-21:00)</span><span className="font-bold">57.00 €</span></div>
          </div>
        </div>
        <div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-dumbbell text-purple-500"></i> Sporta zāles (Raiņa ielā-1) – cenas ar PVN</h2><div className="grid md:grid-cols-2 gap-3 text-sm"><div className="flex justify-between border-b py-2"><span>Lielās sporta zāles īre (1 stunda)</span><span className="font-bold">42.00 €</span></div><div className="flex justify-between border-b py-2"><span>Mazās zāles īre (1 stunda)</span><span className="font-bold">20.00 €</span></div><div className="flex justify-between border-b py-2"><span>Individuālās nodarbības badmintonā, galda tenisā (mēnesī)</span><span className="font-bold">15.00 €</span></div><div className="flex justify-between border-b py-2"><span>Aerobikas zāles īre (1 stunda)</span><span className="font-bold">20.00 €</span></div><div className="flex justify-between border-b py-2"><span>Trenažieru zāles īre (1 stunda)</span><span className="font-bold">20.00 €</span></div></div></div>
        <div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-building text-red-500"></i> Sporta komplekss (Tērvetes 91D)</h2><div className="grid md:grid-cols-2 gap-3 text-sm"><div className="flex justify-between border-b py-2"><span>Nodarbības līdz 4 cilvēkiem (1 stunda)</span><span className="font-bold">23.00 €</span></div><div className="flex justify-between border-b py-2"><span>Nodarbības 4-30 cilvēkiem (1 stunda)</span><span className="font-bold">32.00 €</span></div><div className="flex justify-between border-b py-2"><span>Nodarbības vairāk par 30 cilvēkiem (1 stunda)</span><span className="font-bold">39.00 €</span></div><div className="flex justify-between border-b py-2"><span>Cīņas sporta zāle (1 stunda)</span><span className="font-bold">12.00 €</span></div></div></div>
        <div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-parking text-amber-500"></i> Auto stāvlaukums (Raiņa ielā 1, Jelgavā)</h2><div className="bg-amber-50 p-3 rounded-lg mb-4 text-sm">Apmeklētājiem līdz 3 stundām bez maksas, jānovieto stāvēšanas pulkstenis redzamā vietā.</div><div className="grid md:grid-cols-3 gap-4 text-sm"><div className="flex justify-between border-b py-2"><span>Līdz 3 stundām</span><span className="font-bold">Bezmaksas</span></div><div className="flex justify-between border-b py-2"><span>Līdz 24 stundām</span><span className="font-bold">3.00 €</span></div><div className="flex justify-between border-b py-2"><span>Mēneša atļauja (30 dienas)</span><span className="font-bold">25.00 €</span></div></div><p className="text-xs text-slate-500 mt-3">Atļauju var iegādāties Sporta centra 2.stāvā pie administratora (darba dienās 9:00–20:00).</p></div>
        <div className="bg-blue-50 rounded-xl p-4 text-sm border border-blue-200"><i className="fas fa-gavel text-blue-600 mr-2"></i> Cenrādis apstiprināts ar Latvijas Biozinātņu un tehnoloģiju universitātes 15.09.2022. rektora rīkojumu Nr. 4.3.-13/76. Spēkā no 2022. gada 1. novembra.</div>
      </div>
    );
    
    // InfoPanel
    const InfoPanel = () => (
      <div className="space-y-6">
        <div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-clock text-blue-500"></i> Peldbaseina publiskā apmeklējuma laiks (no 2026. gada 1. maija)</h2><div className="grid md:grid-cols-2 gap-3 text-sm bg-gray-50 p-4 rounded-xl"><div><span className="font-bold">Pirmdiena:</span> {poolSchedule.monday}</div><div><span className="font-bold">Otrdiena:</span> {poolSchedule.tuesday}</div><div><span className="font-bold">Trešdiena:</span> {poolSchedule.wednesday}</div><div><span className="font-bold">Ceturtdiena:</span> {poolSchedule.thursday}</div><div><span className="font-bold">Piektdiena:</span> {poolSchedule.friday}</div><div><span className="font-bold">Sestdiena:</span> {poolSchedule.saturday}</div><div><span className="font-bold">Svētdiena:</span> {poolSchedule.sunday}</div></div><p className="text-sm text-amber-700 mt-3 bg-amber-50 p-2 rounded-lg">Publiskās peldēšanas laiks jāpiesaka iepriekš zvanot pa tālruni 25427282</p></div>
        <div className="bg-white rounded-2xl p-6 border shadow-md"><h2 className="text-2xl font-bold flex items-center gap-2 mb-4"><i className="fas fa-file-alt text-emerald-600"></i> Sporta centra iekšējās kārtības noteikumi</h2><ul className="list-disc pl-5 space-y-2 text-sm rule-list"><li>Sporta centra apmeklētāji personīgi atbild par savu veselības stāvokli un drošības noteikumu ievērošanu.</li><li>Bērni līdz 14 gadu vecumam drīkst atrasties tikai vecāku vai pilngadīga pavadoņa uzraudzībā.</li><li>Peldbaseina un sporta zāļu telpās atļauts ieiet tikai tīros maiņas apavos; virsdrēbes atstāt garderobē.</li><li><span className="font-bold">Stingri aizliegts:</span> ienest stikla traukus, atrasties alkohola/narkotiku reibumā, smēķēt, bojāt inventāru, lēkt ūdenī no baseina malām, spļaut ūdenī vai uz grīdas (sods līdz 30 €).</li><li>Personām ar ādas slimībām, atklātām brūcēm, konjuktivītu vai citām lipīgām saslimšanām peldbaseinu apmeklēt aizliegts.</li><li>Par atstātajām vērtslietām ģērbtuvēs administrācija atbildību nenes.</li><li>Nodarbību laikā ar cieņu jāizturas vienam pret otru un jāievēro instruktoru norādījumi.</li></ul></div>
      </div>
    );
    
    // Filtri
    const Filters = ({ sportFilter, setSportFilter, priceRange, setPriceRange }) => {
      const sportTypes = ["all", "swimming", "gym", "football"];
      const displayNames = { all:"Visi", swimming:"Peldēšana", gym:"Treniņu zāles", football:"Komplekss" };
      return (
        <div className="bg-white rounded-xl p-4 border border-gray-200 shadow-sm"><div className="flex flex-wrap gap-3 items-center justify-between"><div className="flex flex-wrap gap-2">{sportTypes.map(sport => (<button key={sport} onClick={() => setSportFilter(sport)} className={`px-3 py-1.5 rounded-full text-sm font-medium transition ${sportFilter === sport ? 'bg-blue-600 text-white' : 'bg-gray-100 text-slate-700 hover:bg-gray-200'}`}>{displayNames[sport]}</button>))}</div><div className="flex items-center gap-2 bg-gray-100 px-3 py-1 rounded-full"><i className="fas fa-euro-sign text-emerald-500"></i><input type="range" min="0" max="100" step="5" value={priceRange} onChange={(e) => setPriceRange(parseInt(e.target.value))} className="w-28 accent-emerald-500" /><span className="text-sm font-mono">≤ {priceRange}€</span></div></div></div>
      );
    };
    
    // Dashboard
    const Dashboard = ({ upcomingBookings, totalHours, onCancelBooking }) => (<div className="space-y-6"><div className="grid md:grid-cols-2 gap-5"><div className="bg-white rounded-2xl p-5 border-l-4 border-emerald-500 shadow"><p className="text-slate-600">Nākamā rezervācija</p><p className="text-2xl font-bold">{upcomingBookings.length > 0 ? upcomingBookings[0].facilityName : "Nav gaidāmo"}</p></div><div className="bg-white rounded-2xl p-5 border-l-4 border-blue-500 shadow"><p className="text-slate-600">Aktīvās rezervācijas</p><p className="text-2xl font-bold">{totalHours}</p></div></div><div className="bg-white rounded-2xl p-5 border shadow"><h3 className="text-xl font-semibold mb-4">Manas rezervācijas</h3>{upcomingBookings.length === 0 && <p className="text-center py-8 text-slate-500">Nav rezervāciju. Izpēti iespējas!</p>}{upcomingBookings.length > 0 && (<div className="overflow-x-auto"><table className="min-w-full text-sm"><thead className="border-b"><tr><th className="text-left py-2">Objekts</th><th>Datums</th><th>Laiks</th><th>Cena</th><th></th></tr></thead><tbody>{upcomingBookings.map(b => (<tr key={b.id} className="border-b"><td className="py-2 font-medium">{b.facilityName}</td><td>{b.date}</td><td>{b.slot}</td><td>{b.price.toFixed(2)} €</td><td><button onClick={() => onCancelBooking(b.id)} className="bg-red-100 text-red-700 px-2 py-1 rounded text-xs"><i className="fas fa-trash"></i> Atcelt</button></td></tr>))}</tbody></table></div>)}</div></div>);
    
    // BookingPage
    const BookingPage = ({ facility, onConfirmBooking, onBack }) => {
      const [selectedDate, setSelectedDate] = React.useState(new Date().toISOString().slice(0,10));
      const [timeSlots, setTimeSlots] = React.useState(generateTimeSlots(facility.id));
      const [selectedSlot, setSelectedSlot] = React.useState(null);
      React.useEffect(() => { setTimeSlots(generateTimeSlots(facility.id)); setSelectedSlot(null); }, [selectedDate, facility.id]);
      const handleSlotSelect = (slot) => { if(slot.status !== 'booked') setSelectedSlot(slot.id === selectedSlot?.id ? null : slot); };
      const totalCost = selectedSlot ? getPriceForFacility(facility, selectedSlot) : 0;
      const handleConfirm = () => { if(selectedSlot) { onConfirmBooking({ facilityId: facility.id, facilityName: facility.name, date: selectedDate, slot: selectedSlot.time, price: totalCost }); setSelectedSlot(null); } };
      return (<div className="max-w-5xl mx-auto"><button onClick={onBack} className="mb-4 text-blue-600 flex items-center gap-1"><i className="fas fa-arrow-left"></i> Atpakaļ uz iespējām</button><div className="bg-white rounded-2xl p-6 border shadow-lg"><div className="flex flex-col lg:flex-row gap-8"><div className="flex-1"><h2 className="text-2xl font-bold">{facility.name}</h2><p className="text-xs text-slate-500 mt-1">{facility.officialNote}</p><div className="mt-4"><label className="block text-slate-700 mb-2">Izvēlieties datumu</label><input type="date" value={selectedDate} min={new Date().toISOString().slice(0,10)} onChange={(e) => setSelectedDate(e.target.value)} className="border rounded-xl px-4 py-2 w-full sm:w-auto" /></div><div className="mt-6"><p className="font-semibold">Laika sloti</p><div className="grid grid-cols-4 sm:grid-cols-6 gap-3 mt-3">{timeSlots.map(slot => { let bgClass = 'bg-gray-100'; if(slot.status === 'booked') bgClass = 'bg-gray-300 line-through cursor-not-allowed'; if(selectedSlot?.id === slot.id) bgClass = 'bg-blue-600 text-white'; if(slot.status === 'available' && (!selectedSlot || selectedSlot.id !== slot.id)) bgClass = 'bg-emerald-100 hover:bg-emerald-200 cursor-pointer'; return (<button key={slot.id} disabled={slot.status === 'booked'} onClick={() => handleSlotSelect(slot)} className={`py-2 rounded-xl text-sm font-medium ${bgClass}`}>{slot.time}{slot.duration === 45 ? ' (45min)' : ''}</button>); })}</div></div></div><div className="lg:w-80 bg-gray-50 rounded-xl p-5 border"><h3 className="text-xl font-bold border-b pb-2">Rezervācijas kopsavilkums</h3><div className="mt-4 space-y-2 text-sm"><p><span className="text-slate-600">Objekts:</span> {facility.name}</p><p><span className="text-slate-600">Datums:</span> {selectedDate}</p><p><span className="text-slate-600">Laiks:</span> {selectedSlot ? selectedSlot.time : '—'}</p><div className="pt-2 mt-2 border-t flex justify-between font-bold"><span>Kopā (EUR ar PVN):</span><span className="text-emerald-600">{totalCost.toFixed(2)} €</span></div></div><button onClick={handleConfirm} disabled={!selectedSlot} className={`mt-5 w-full py-2.5 rounded-xl font-bold ${selectedSlot ? 'bg-emerald-600 text-white' : 'bg-gray-300 cursor-not-allowed'}`}>Apstiprināt rezervāciju</button></div></div></div></div>);
    };
    
    const HeroSection = () => (
      <div className="relative rounded-2xl overflow-hidden mb-6 bg-gradient-to-r from-blue-600 to-emerald-500 shadow-xl">
        <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=2070&q=80')] bg-cover bg-center opacity-10"></div>
        <div className="relative p-8 md:p-12 text-center"><h1 className="text-4xl md:text-5xl font-bold mb-4 text-white">LBTU Sporta centrs</h1><p className="text-lg text-white/90 max-w-2xl mx-auto">Oficiālie pakalpojumi, cenas un noteikumi – rezervē baseinu, sporta zāles, kompleksu un stāvvietu.</p></div>
      </div>
    );
    
    // Main App
    const App = () => {
      const [activeTab, setActiveTab] = React.useState('facilities');
      const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
      const [sportFilter, setSportFilter] = React.useState('all');
      const [priceRange, setPriceRange] = React.useState(100);
      const [userBookings, setUserBookings] = React.useState([]);
      const [bookingFacility, setBookingFacility] = React.useState(null);
      
      const upcomingSorted = [...userBookings].filter(b => b.date >= new Date().toISOString().slice(0,10)).sort((a,b)=>a.date.localeCompare(b.date));
      const totalHours = userBookings.length;
      const handleBookNow = (facility) => { setBookingFacility(facility); setActiveTab('bookingFlow'); };
      const handleConfirmBooking = (newBooking) => { setUserBookings(prev => [...prev, { id: Date.now().toString(), ...newBooking }]); setBookingFacility(null); setActiveTab('dashboard'); alert(`Rezervēts: ${newBooking.facilityName} ${newBooking.date} plkst. ${newBooking.slot} - ${newBooking.price.toFixed(2)} € (LBTU oficiālā cena)`); };
      const handleCancelBooking = (id) => setUserBookings(prev => prev.filter(b => b.id !== id));
      
      const filteredFacilities = facilitiesData.filter(f => (sportFilter === 'all' || f.sportType === sportFilter) && f.basePrice <= priceRange);
      
      let mainContent;
      if (activeTab === 'facilities') mainContent = (<><HeroSection /><RealTimeClockWidget /><div className="mt-6"><Filters sportFilter={sportFilter} setSportFilter={setSportFilter} priceRange={priceRange} setPriceRange={setPriceRange} /></div><div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-6">{filteredFacilities.map(fac => <FacilityCard key={fac.id} facility={fac} onBookNow={handleBookNow} />)}</div></>);
      else if (activeTab === 'dashboard') mainContent = <Dashboard upcomingBookings={upcomingSorted} totalHours={totalHours} onCancelBooking={handleCancelBooking} />;
      else if (activeTab === 'pricing') mainContent = <PricingPanel />;
      else if (activeTab === 'info') mainContent = <InfoPanel />;
      else if (activeTab === 'contacts') mainContent = <ContactsPanel />;
      else if (activeTab === 'bookingFlow' && bookingFacility) mainContent = <BookingPage facility={bookingFacility} onConfirmBooking={handleConfirmBooking} onBack={() => { setBookingFacility(null); setActiveTab('facilities'); }} />;
      else mainContent = <div className="text-center py-20">Notiek ielāde...</div>;
      
      return (<div><NavBar activeTab={activeTab === 'bookingFlow' ? 'facilities' : activeTab} setActiveTab={(tab) => { if(tab !== 'bookingFlow') { setBookingFacility(null); setActiveTab(tab); } }} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen} /><main className="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">{mainContent}</main><footer className="text-center py-6 text-slate-500 text-sm border-t mt-12"><span>© 2x200 Developer - Depositary (as of 8 June 2026) 👉</span><br className="block sm:hidden" /><a href="https://github.com/2x200/LBTU-Sporta-Centrs" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:text-blue-700 underline inline-flex items-center gap-1 mt-2 sm:mt-0 sm:ml-2"><i className="fas fa-external-link-alt text-xs"></i>GitHub.com</a></footer></div>);
    };
    
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
